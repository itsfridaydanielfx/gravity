<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gravity Warriors — Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <div class="phone-frame">
      <div class="app generator-stack">
        <header class="topbar">
          <a class="icon-btn" href="index.html" aria-label="Back">←</a>
          <div class="brand">
            <div class="brand-kicker">Admin helper</div>
            <div class="brand-title">Generator</div>
          </div>
          <a class="icon-btn" href="zasady.html" aria-label="Rules">📘</a>
        </header>

        <section class="panel">
          <div class="section-label">Athlete data</div>
          <form id="generatorForm" class="form-grid">
            <div class="full"><input class="input" name="name" placeholder="Athlete name" value="Nowy zawodnik"></div>
            <div class="full"><input class="input" name="photo" placeholder="Photo path" value="assets/athletes/placeholder-1.svg"></div>
            <div><input class="input" type="number" step="0.1" min="0" name="bodyweight_kg" placeholder="Bodyweight kg" value="80"></div>
            <div><input class="input" type="number" step="0.1" min="0" name="pullup_added_weight_kg" placeholder="Pull-up added" value="40"></div>
            <div><input class="input" type="number" step="0.1" min="0" name="dip_added_weight_kg" placeholder="Dip added" value="60"></div>
            <div><input class="input" type="number" step="0.1" min="0" name="muscleup_added_weight_kg" placeholder="Muscle-up added" value="15"></div>
            <div><input class="input" type="number" step="0.1" min="0" name="bench_kg" placeholder="Bench" value="120"></div>
            <div><input class="input" type="number" step="0.1" min="0" name="squat_kg" placeholder="Squat" value="160"></div>
            <div><input class="input" type="number" step="0.1" min="0" name="deadlift_kg" placeholder="Deadlift" value="200"></div>
            <div><input class="input" type="number" step="0.1" min="0" name="ohp_kg" placeholder="OHP" value="70"></div>
            <div class="full"><input class="input" type="number" step="0.1" min="0" name="biceps_kg" placeholder="Biceps" value="45"></div>
          </form>
        </section>

        <section class="panel">
          <div class="section-label">Live preview</div>
          <div id="livePreview" class="preview-grid"></div>
        </section>

        <section class="panel">
          <div class="section-label">Warnings</div>
          <div id="warnings" class="copy-wrap"></div>
        </section>

        <section class="panel">
          <div class="section-label">Generated block</div>
          <div class="copy-wrap">
            <textarea class="textarea" id="generatedOutput" readonly></textarea>
            <button class="btn" id="copyOutput" type="button">Copy block</button>
          </div>
        </section>
      </div>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="scoring.js"></script>
  <script src="generator.js"></script>
</body>
</html>
