<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gravity Warriors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="page-ranking">
  <main class="ranking-page">
    <section class="ranking-screen ranking-screen--full">
      <header class="ranking-header">
        <div class="header-side left-tools">
          <a class="tool-btn tool-btn--large" href="zasady.html" aria-label="Zasady" title="Zasady">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 4H6.8A2.8 2.8 0 0 0 4 6.8v10.4A2.8 2.8 0 0 0 6.8 20H17.2A2.8 2.8 0 0 0 20 17.2V14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M8 12h4M8 16h6M14 4l6 6M20 4v6h-6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </a>

          <div class="filter-trigger-wrap">
            <button class="tool-btn tool-btn--large tool-btn--accent" id="filterToggle" type="button" aria-label="Filtruj kategorię" title="Filtruj kategorię">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16l-6 7v5l-4-2v-3L4 6z" fill="currentColor"/></svg>
            </button>
            <select class="floating-select" id="categorySelect" aria-label="Kategoria rankingu"></select>
          </div>
        </div>

        <div class="brand brand--ranking">
          <div class="brand-title-stack">
            <span class="brand-line brand-line-top">Najsilniejsi</span>
            <span class="brand-line brand-line-bottom">WILKS</span>
          </div>
          <div class="brand-subtitle" id="categoryBadge">Overall</div>
        </div>

        <div class="header-side right-tools">
          <button class="tool-btn tool-btn--large" id="nextCategoryBtn" type="button" aria-label="Następna kategoria" title="Następna kategoria">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 5l7 7-7 7" fill="none" stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <a class="tool-btn tool-btn--large" href="generator.html" aria-label="Generator zawodnika" title="Generator zawodnika">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.5l1.6 2.1 2.6.4.6 2.5 2.3 1.3-.8 2.5.8 2.5-2.3 1.3-.6 2.5-2.6.4L12 20.5l-1.6-2.1-2.6-.4-.6-2.5L4.9 14l.8-2.5-.8-2.5 2.3-1.3.6-2.5 2.6-.4L12 3.5z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="12" cy="12" r="3.2" fill="none" stroke="currentColor" stroke-width="2"/></svg>
          </a>
        </div>
      </header>

      <section class="ranking-stage">
        <div class="ranking-list ranking-list--flat" id="rankingList"></div>
        <div class="empty-state empty-state--dark" id="emptyState" hidden>Brak zawodników w tej kategorii.</div>
      </section>

      <footer class="ranking-footer">
        <span>Scoring <strong id="versionName"></strong></span>
        <span class="footer-dot"></span>
        <span>Kliknij zawodnika po breakdown</span>
      </footer>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="athletes.js"></script>
  <script src="scoring.js"></script>
  <script src="app.js"></script>
</body>
</html>
