<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gravity Warriors</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <div class="phone-frame">
      <div class="app">
        <header class="topbar">
          <a class="icon-btn" href="zasady.html" aria-label="Rules">📘</a>
          <div class="brand">
            <div class="brand-kicker">Ranking app</div>
            <div class="brand-title">GRAVITY WARRIORS</div>
          </div>
          <a class="icon-btn" href="generator.html" aria-label="Generator">⚙️</a>
        </header>

        <section class="panel">
          <div class="filter-wrap">
            <label class="filter-label" for="categorySelect">Category</label>
            <select class="select" id="categorySelect"></select>
          </div>

          <div class="ranking-list" id="rankingList"></div>
          <div class="empty-state" id="emptyState" hidden>No athletes available for this category yet.</div>
        </section>

        <div class="bottom-meta">Scoring system <span id="versionName"></span></div>
      </div>
    </div>
  </main>

  <script src="config.js"></script>
  <script src="athletes.js"></script>
  <script src="scoring.js"></script>
  <script src="app.js"></script>
</body>
</html>
